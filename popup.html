<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 210px;
      padding: 14px 16px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }

    h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111;
    }

    button {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      text-align: left;
      transition: background 0.12s;
    }

    button:hover { background: #e8e8e8; }
  </style>
</head>
<body>
  <h3>&#9888; Production Warning</h3>
  <button id="options-btn">&#9881; Manage settings</button>
  <script src="popup.js"></script>
</body>
</html>
